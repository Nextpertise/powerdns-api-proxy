---
on:
  push:
    branches:
      - "*"
    tags:
      - "v*.*.*"
jobs:
  prerequisites:
    uses: Nextpertise/github-actions-shared-scripts/.github/workflows/prerequisites.yaml@1.0
    with:
      runs-on: public-runners

  build_image:
    runs-on: public-runners
    needs:
      - prerequisites
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to registry
        uses: docker/login-action@v4
        with:
          registry: registry.nextpertise.tools
          username: ${{ secrets.REGISTRY_NEXTPERTISE_TOOLS_ACCOUNT }}
          password: ${{ secrets.REGISTRY_NEXTPERTISE_TOOLS_KEY }}

      - name: Set context
        run: echo "context=$(pwd)" >> $GITHUB_ENV

      - name: Push image to registry
        uses: docker/build-push-action@v7
        with:
          file: ./docker/Dockerfile
          context: ${{ env.context }}
          push: true
          tags: |
            registry.nextpertise.tools/nextpertise/michaeltest:${{ github.ref_name }}